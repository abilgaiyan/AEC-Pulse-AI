services:
  # 1. Database - Added a Volume to persist your Project Data
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: aec-pulse-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql  # 

  # 2. .NET 9 API
  api:
    build: 
      context: .
      dockerfile: backend/src/AECPulse.API/Dockerfile
    environment:
      # Use the variable here too! Note the server name is 'db' (the service name)
      - ConnectionStrings__DefaultConnection=Server=db;Database=AECPulseDB;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True
      - Foundry__ApiKey=${FOUNDRY_API_KEY}
      - Foundry__Endpoint=${FOUNDRY_ENDPOINT}
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "7001:8080"
    depends_on:
      db:
        condition: service_healthy # 👈 Wait until SQL is actually READY, not just starting

  # 3. React Client
  client:
    build: ./frontend
    ports:
      - "3000:5173"
    environment:
      - VITE_API_URL=http://localhost:7001
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules/

# Define the persistent volume for SQL Server data
volumes:
  sql_data: